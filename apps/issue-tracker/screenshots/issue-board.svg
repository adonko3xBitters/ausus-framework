<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-label="Issue tracker board view rendered by the AUSUS React renderer">
  <title>Issue tracker board view</title>
  <desc>The Issues tab of the sample app, rendered by @ausus/renderer-react. A table of six seeded issues from three projects, showing project_id, title, reporter, assignee, priority, and a colored status badge. The header has a Create button. Per-row workflow buttons (Start, Review, Done, Wontfix) sit in the Actions column.</desc>
  <defs>
    <style><![CDATA[
      .bg{fill:#f6f7f9}
      .card{fill:#fff;stroke:#e3e3e3;stroke-width:1}
      .sep{stroke:#eee;stroke-width:1}
      .head{font:600 14px system-ui,sans-serif;fill:#1a1a1a}
      .nav{font:500 12px system-ui,sans-serif;fill:#1a1a1a}
      .nav-active{font:500 12px system-ui,sans-serif;fill:#fff}
      .title{font:600 17px system-ui,sans-serif;fill:#1a1a1a}
      .col{font:600 11px system-ui,sans-serif;fill:#475569;text-transform:uppercase;letter-spacing:.04em}
      .cell{font:13px system-ui,sans-serif;fill:#1a1a1a}
      .mono{font:11px ui-monospace,monospace;fill:#475569}
      .badge-text{font:600 10px system-ui,sans-serif;fill:#1a1a1a}
      .btn-text{font:500 10px system-ui,sans-serif;fill:#1a1a1a}
      .btn-text-primary{font:500 11px system-ui,sans-serif;fill:#fff}
      .footnote{font:11px system-ui,sans-serif;fill:#94a3b8}
    ]]></style>
  </defs>

  <rect class="bg" width="900" height="460"/>

  <!-- header -->
  <rect x="0" y="0" width="900" height="46" fill="#fff"/>
  <line x1="0" y1="46" x2="900" y2="46" stroke="#e3e3e3"/>
  <text class="head" x="20" y="28">AUSUS · Issue Tracker</text>
  <!-- nav buttons -->
  <rect x="200" y="14" width="78" height="22" rx="6" fill="#fff" stroke="#cbd5e1"/>
  <text class="nav" x="220" y="29">Projects</text>
  <rect x="284" y="14" width="62" height="22" rx="6" fill="#2563eb" stroke="#2563eb"/>
  <text class="nav-active" x="298" y="29">Issues</text>
  <rect x="352" y="14" width="86" height="22" rx="6" fill="#fff" stroke="#cbd5e1"/>
  <text class="nav" x="368" y="29">Comments</text>

  <text class="footnote" x="560" y="30">tip: project_id is a plain string — v0.1.x has no FK contract</text>

  <!-- title row -->
  <text class="title" x="20" y="80">tracker.issue.board</text>
  <rect x="800" y="62" width="78" height="26" rx="6" fill="#2563eb" stroke="#2563eb"/>
  <text class="btn-text-primary" x="820" y="80">Create</text>

  <!-- table card -->
  <rect class="card" x="20" y="100" width="860" height="340" rx="2"/>

  <!-- thead -->
  <rect x="21" y="101" width="858" height="30" fill="#fafafa"/>
  <text class="col" x="36"  y="120">Id</text>
  <text class="col" x="138" y="120">Project</text>
  <text class="col" x="230" y="120">Title</text>
  <text class="col" x="470" y="120">Reporter</text>
  <text class="col" x="570" y="120">Assignee</text>
  <text class="col" x="660" y="120">Priority</text>
  <text class="col" x="724" y="120">Status</text>
  <text class="col" x="790" y="120">Actions</text>
  <line class="sep" x1="21" y1="131" x2="879" y2="131"/>

  <!-- row 1 — ENG, DOING -->
  <text class="mono" x="36"  y="158">01J7…D3K</text>
  <text class="mono" x="138" y="158">01J7…ENG</text>
  <text class="cell" x="230" y="158">Renderer crashes on null money</text>
  <text class="cell" x="470" y="158">alice@acme</text>
  <text class="cell" x="570" y="158">carol@acme</text>
  <text class="cell" x="660" y="158">HIGH</text>
  <rect x="720" y="144" width="60" height="20" rx="10" fill="#dbeafe"/>
  <text class="badge-text" x="728" y="158">DOING</text>
  <rect x="790" y="142" width="50" height="22" rx="6" fill="#fff" stroke="#ccc"/>
  <text class="btn-text" x="804" y="157">Review</text>
  <line class="sep" x1="21" y1="178" x2="879" y2="178"/>

  <!-- row 2 — ENG, TODO -->
  <text class="mono" x="36"  y="205">01J7…F7M</text>
  <text class="mono" x="138" y="205">01J7…ENG</text>
  <text class="cell" x="230" y="205">Add filter param to /projections</text>
  <text class="cell" x="470" y="205">alice@acme</text>
  <text class="cell" x="570" y="205">—</text>
  <text class="cell" x="660" y="205">NORMAL</text>
  <rect x="720" y="191" width="50" height="20" rx="10" fill="#e2e8f0"/>
  <text class="badge-text" x="728" y="205">TODO</text>
  <rect x="790" y="189" width="44" height="22" rx="6" fill="#fff" stroke="#ccc"/>
  <text class="btn-text" x="804" y="204">Start</text>
  <line class="sep" x1="21" y1="225" x2="879" y2="225"/>

  <!-- row 3 — ENG, REVIEW -->
  <text class="mono" x="36"  y="252">01J7…J2N</text>
  <text class="mono" x="138" y="252">01J7…ENG</text>
  <text class="cell" x="230" y="252">Document workflow guard semantics</text>
  <text class="cell" x="470" y="252">alice@acme</text>
  <text class="cell" x="570" y="252">dave@acme</text>
  <text class="cell" x="660" y="252">LOW</text>
  <rect x="720" y="238" width="66" height="20" rx="10" fill="#fef3c7"/>
  <text class="badge-text" x="728" y="252">REVIEW</text>
  <rect x="790" y="236" width="46" height="22" rx="6" fill="#fff" stroke="#ccc"/>
  <text class="btn-text" x="803" y="251">Done</text>
  <line class="sep" x1="21" y1="272" x2="879" y2="272"/>

  <!-- row 4 — OPS, DOING -->
  <text class="mono" x="36"  y="299">01J7…P4Q</text>
  <text class="mono" x="138" y="299">01J7…OPS</text>
  <text class="cell" x="230" y="299">Provision new staging box</text>
  <text class="cell" x="470" y="299">bob@acme</text>
  <text class="cell" x="570" y="299">eve@acme</text>
  <text class="cell" x="660" y="299">URGENT</text>
  <rect x="720" y="285" width="60" height="20" rx="10" fill="#dbeafe"/>
  <text class="badge-text" x="728" y="299">DOING</text>
  <rect x="790" y="283" width="50" height="22" rx="6" fill="#fff" stroke="#ccc"/>
  <text class="btn-text" x="804" y="298">Review</text>
  <line class="sep" x1="21" y1="319" x2="879" y2="319"/>

  <!-- row 5 — OPS, TODO -->
  <text class="mono" x="36"  y="346">01J7…R6S</text>
  <text class="mono" x="138" y="346">01J7…OPS</text>
  <text class="cell" x="230" y="346">Rotate Slack webhook secret</text>
  <text class="cell" x="470" y="346">bob@acme</text>
  <text class="cell" x="570" y="346">eve@acme</text>
  <text class="cell" x="660" y="346">NORMAL</text>
  <rect x="720" y="332" width="50" height="20" rx="10" fill="#e2e8f0"/>
  <text class="badge-text" x="728" y="346">TODO</text>
  <rect x="790" y="330" width="44" height="22" rx="6" fill="#fff" stroke="#ccc"/>
  <text class="btn-text" x="804" y="345">Start</text>
  <line class="sep" x1="21" y1="366" x2="879" y2="366"/>

  <!-- row 6 — DOC, TODO -->
  <text class="mono" x="36"  y="393">01J7…T8U</text>
  <text class="mono" x="138" y="393">01J7…DOC</text>
  <text class="cell" x="230" y="393">Translate troubleshooting page</text>
  <text class="cell" x="470" y="393">dave@acme</text>
  <text class="cell" x="570" y="393">—</text>
  <text class="cell" x="660" y="393">LOW</text>
  <rect x="720" y="379" width="50" height="20" rx="10" fill="#e2e8f0"/>
  <text class="badge-text" x="728" y="393">TODO</text>
  <rect x="790" y="377" width="44" height="22" rx="6" fill="#fff" stroke="#ccc"/>
  <text class="btn-text" x="804" y="392">Start</text>

  <text class="footnote" x="20" y="450">SVG mockup of the React renderer's ListView on tracker.issue.board — not a photographic screenshot. The board returns all 6 seeded issues; client-side filtering is the only way to view one project at a time (FRAMEWORK-FINDINGS.md §2).</text>
</svg>
