version: 2
updates:

  # ── PHP — Composer (workspace root) ────────────────────────────────────
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - "dependencies"
      - "php"
    groups:
      php-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      php-major:
        applies-to: version-updates
        update-types: ["major"]

  # ── npm — root workspace (renderer + playground) ───────────────────────
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - "dependencies"
      - "javascript"
    groups:
      # All dev-only deps (types, esbuild, tsx, typescript) merged into one PR
      js-dev:
        applies-to: version-updates
        dependency-type: "development"
        patterns: ["*"]
      # Non-React runtime patch/minor (currently empty, future-proof)
      js-runtime-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types: ["minor", "patch"]
        exclude-patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
    # React majors handled separately — they need the test matrix to pick up
    # the new version. Don't ignore; CI matrix now covers 18+19, so a 19 bump
    # PR will go green once merged.

  # ── GitHub Actions — keep CI workflow pinned but fresh ─────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: "monday"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels:
      - "dependencies"
      - "github_actions"
    groups:
      ci-actions:
        applies-to: version-updates
        patterns: ["*"]
