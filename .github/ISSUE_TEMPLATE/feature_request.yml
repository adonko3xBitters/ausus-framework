name: Feature request
description: Propose a new feature, capability, or RFC topic
title: "[feat] <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Significant architectural changes go through an RFC under `rfcs/`.
        Small feature requests fit here.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point are you solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: Affected layer
      options:
        - L0 — Kernel
        - L1 — Compiler
        - L2 — Runtime
        - L3 — Drivers (persistence / tenancy / audit / auth)
        - L4 — API surface
        - L5 — Presentation
        - L6 — Renderer
        - L7 — Plugins / starter
        - Multiple / cross-cutting
        - Tooling / CI
    validations:
      required: true

  - type: checkboxes
    id: rfc-required
    attributes:
      label: Is an RFC likely needed?
      options:
        - label: Yes — this touches a public contract or invariant
        - label: No — internal change with no API impact
