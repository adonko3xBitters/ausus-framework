name: release-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: release-gate (local + structural)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, mbstring, intl
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: npm install
        run: npm ci --no-audit --no-fund

      - name: Run scripts/ci.sh
        run: bash scripts/ci.sh

      - name: Run scripts/clean-room.sh
        run: bash scripts/clean-room.sh

      - name: Run scripts/release-gate.sh (local mode)
        run: bash scripts/release-gate.sh
        env:
          RELEASE_GATE_LIVE: '0'
