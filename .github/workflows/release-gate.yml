name: release-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'v*'

  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: release-gate (PHP ${{ matrix.php }})
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      # Surface every PHP-version-specific regression independently rather than
      # masking one behind another's failure.
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, mbstring, intl
          tools: composer:v2

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: npm install
        run: npm ci --no-audit --no-fund

      - name: Run scripts/ci.sh
        run: bash scripts/ci.sh

      - name: Run scripts/clean-room.sh
        run: bash scripts/clean-room.sh

      - name: Run scripts/release-gate.sh (local mode)
        run: bash scripts/release-gate.sh
        env:
          RELEASE_GATE_LIVE: '0'
