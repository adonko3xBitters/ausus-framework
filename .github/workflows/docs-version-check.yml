name: docs-version-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'  # daily 07:00 UTC — catch drift between PRs

concurrency:
  group: docs-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check doc version coherence
        run: bash scripts/check-doc-version.sh
        env:
          PACKAGIST_TIMEOUT_SECONDS: '10'
