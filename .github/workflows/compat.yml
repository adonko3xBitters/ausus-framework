name: Compat (persistence-postgres)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      line:
        description: 'Force line (auto|gen2|legacy)'
        required: false
        default: 'auto'

concurrency:
  group: compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Same release-line resolution as the rest of the chain. The cross-driver
  # PostgreSQL compatibility suite validates the Legacy ausus/persistence-postgres
  # driver, which does not belong to the Gen2 line (Gen2 ships only
  # ausus/persistence-memory). On the Gen2 line there is no relevant cross-driver
  # validation, so the compat job is skipped cleanly.
  resolve-line:
    name: resolve release line
    runs-on: ubuntu-latest
    outputs:
      line: ${{ steps.line.outputs.line }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - id: line
        name: Resolve line
        run: |
          LINE="${{ github.event.inputs.line }}"
          if [ -z "$LINE" ] || [ "$LINE" = "auto" ]; then
            if jq -e '.require["ausus/entity-engine"]' composer.json >/dev/null 2>&1; then
              LINE=gen2
            else
              LINE=legacy
            fi
          fi
          . scripts/release-packages.sh
          ausus_release_line "$LINE" >/dev/null
          echo "Resolved release line: $LINE"
          echo "line=$LINE" >> "$GITHUB_OUTPUT"

  compat:
    name: cross-driver compat
    needs: resolve-line
    if: needs.resolve-line.outputs.line == 'legacy'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ausus_compat
          POSTGRES_USER: ausus
          POSTGRES_PASSWORD: ausus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ausus -d ausus_compat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUSUS_PG_DSN: pgsql:host=127.0.0.1;port=5432;dbname=ausus_compat
      AUSUS_PG_USER: ausus
      AUSUS_PG_PASS: ausus
      # Refuse a green run that silently fell back to SQLite-only: the suite
      # exits non-zero unless the PostgreSQL driver actually participated.
      AUSUS_PG_REQUIRED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, pdo_pgsql
          coverage: none
          tools: composer:v2

      - name: Composer install
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cross-driver compat suite
        run: php packages/persistence-postgres/tests/compat.php
