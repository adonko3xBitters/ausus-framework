name: npm-publish

# Two independent renderer packages coexist in this monorepo:
#   legacy → renderer/react            → @ausus/renderer-react
#   gen2   → packages/react-renderer   → @ausus/react-renderer   (AUSUS 2.0)
#
# Both jobs run on every release tag but each one PUBLISHES ONLY when its own
# package.json version equals the tag — otherwise it skips. So a v1.x tag
# publishes the legacy renderer and skips gen2; a v2.x tag publishes the gen2
# renderer and skips legacy. Neither line can block the other.

on:
  push:
    tags:
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'
      - 'v*.*.*-rc.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish from (e.g. v2.0.0)'
        required: true

jobs:
  publish-legacy:
    name: publish @ausus/renderer-react (legacy)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      PKG_DIR: renderer/react
      PKG_NAME: '@ausus/renderer-react'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Resolve tag + decide whether this line matches
        id: match
        run: |
          INPUT="${{ github.event.inputs.tag }}"; [ -n "$INPUT" ] || INPUT="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${INPUT#v}"
          PKG_VERSION=$(jq -r '.version' "$PKG_DIR/package.json")
          echo "TAG_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"
          if [ "$PKG_VERSION" = "$TAG_VERSION" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"; echo "legacy renderer matches tag ($PKG_VERSION) — will publish"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"; echo "legacy renderer ($PKG_VERSION) ≠ tag ($TAG_VERSION) — skipping"
          fi
      - name: Install deps
        if: steps.match.outputs.go == 'true'
        working-directory: renderer/react
        run: npm ci --no-audit --no-fund
      - name: Build
        if: steps.match.outputs.go == 'true'
        working-directory: renderer/react
        run: npm run build
      - name: Validate built artifacts
        if: steps.match.outputs.go == 'true'
        working-directory: renderer/react
        run: |
          [ -f dist/index.js ] || { echo "::error::dist/index.js missing"; exit 1; }
          [ -f dist/index.d.ts ] || { echo "::error::dist/index.d.ts missing"; exit 1; }
      - name: npm publish
        if: steps.match.outputs.go == 'true'
        working-directory: renderer/react
        run: |
          DIST_TAG=latest
          case "$TAG_VERSION" in *-alpha.*|*-beta.*|*-rc.*) DIST_TAG=next;; esac
          npm publish --tag "$DIST_TAG" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gen2:
    name: publish @ausus/react-renderer (gen2)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      PKG_DIR: packages/react-renderer
      PKG_NAME: '@ausus/react-renderer'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Resolve tag + decide whether this line matches
        id: match
        run: |
          INPUT="${{ github.event.inputs.tag }}"; [ -n "$INPUT" ] || INPUT="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${INPUT#v}"
          PKG_VERSION=$(jq -r '.version' "$PKG_DIR/package.json")
          echo "TAG_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"
          if [ "$PKG_VERSION" = "$TAG_VERSION" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"; echo "gen2 renderer matches tag ($PKG_VERSION) — will publish"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"; echo "gen2 renderer ($PKG_VERSION) ≠ tag ($TAG_VERSION) — skipping"
          fi
      - name: Build (prepare hook builds dist)
        if: steps.match.outputs.go == 'true'
        working-directory: packages/react-renderer
        run: npm ci --no-audit --no-fund && npm run build
      - name: Validate built artifacts
        if: steps.match.outputs.go == 'true'
        working-directory: packages/react-renderer
        run: |
          [ -f dist/index.js ] || { echo "::error::dist/index.js missing"; exit 1; }
          [ -f dist/index.d.ts ] || { echo "::error::dist/index.d.ts missing"; exit 1; }
      - name: npm publish
        if: steps.match.outputs.go == 'true'
        working-directory: packages/react-renderer
        run: |
          DIST_TAG=latest
          case "$TAG_VERSION" in *-alpha.*|*-beta.*|*-rc.*) DIST_TAG=next;; esac
          npm publish --tag "$DIST_TAG" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
