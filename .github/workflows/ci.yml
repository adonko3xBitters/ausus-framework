name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      line:
        description: 'Force CI line (auto|gen2|legacy)'
        required: false
        default: 'auto'

# Cancel in-flight runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Release-line resolution — same source of truth as the publish chain
  # (scripts/release-packages.sh). On a PR/push there is no tag, so the
  # active Composer workspace decides: the Gen2 workspace requires
  # ausus/entity-engine; the Legacy workspace requires ausus/standard-stack.
  # `workflow_dispatch` can force a line. Only the resolved line's CI runs.
  # ─────────────────────────────────────────────────────────────────────
  resolve-line:
    name: resolve release line
    runs-on: ubuntu-latest
    outputs:
      line: ${{ steps.line.outputs.line }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - id: line
        name: Resolve line
        run: |
          LINE="${{ github.event.inputs.line }}"
          if [ -z "$LINE" ] || [ "$LINE" = "auto" ]; then
            if jq -e '.require["ausus/entity-engine"]' composer.json >/dev/null 2>&1; then
              LINE=gen2
            else
              LINE=legacy
            fi
          fi
          # Validate against the canonical line registry used by release-publish,
          # release-gate, packagist-validation and npm-publish.
          . scripts/release-packages.sh
          ausus_release_line "$LINE" >/dev/null
          echo "Resolved release line: $LINE"
          echo "line=$LINE" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────
  # Gen2 (AUSUS 2.0 Entity Engine) — runs ONLY scripts/ci-gen2.sh, the
  # official Gen2 CI reference. No Legacy demonstrator is ever executed.
  #
  # Node is pinned to 22 (not the 18/20/22 matrix used by the Legacy job):
  # scripts/ci-gen2.sh runs its TypeScript test suites with
  # `node --test --experimental-strip-types`, a flag introduced in Node 22.6.0
  # and absent on 18/20 (where it fails with `bad option`). The other ci-gen2
  # steps (composer + PHP suites, and the npm pack build) are 18/20-compatible,
  # but ci-gen2.sh is a single script that always runs the strip-types TS step,
  # so the whole job must run on a Node that supports it. The PHP matrix
  # (8.3/8.4) is preserved; the Legacy job keeps the full 18/20/22 Node matrix.
  # ─────────────────────────────────────────────────────────────────────
  ci-gen2:
    name: gen2 · ${{ matrix.php-version }} · node${{ matrix.node-version }}
    needs: resolve-line
    if: needs.resolve-line.outputs.line == 'gen2'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:  ['8.3', '8.4']
        node-version: ['22']   # ci-gen2.sh TS suites need Node >=22.6 (--experimental-strip-types)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show toolchain
        run: |
          php --version | head -1
          composer --version
          node --version
          npm --version

      - name: Install renderer devDeps (typescript for the npm pack/prepare build)
        run: npm install --prefix packages/react-renderer --no-audit --no-fund

      - name: Gen2 CI (scripts/ci-gen2.sh)
        run: bash scripts/ci-gen2.sh

  # ─────────────────────────────────────────────────────────────────────
  # Legacy (standard-stack) — unchanged. Runs only on the Legacy line.
  # PHP 8.3/8.4 × Node 18/20/22. Clean-room/integration on the tip slot.
  # ─────────────────────────────────────────────────────────────────────
  ci-legacy:
    name: legacy · ${{ matrix.php-version }} · node${{ matrix.node-version }}
    needs: resolve-line
    if: needs.resolve-line.outputs.line == 'legacy'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:  ['8.3', '8.4']
        node-version: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show toolchain
        run: |
          php --version | head -1
          composer --version
          node --version
          npm --version

      - name: Composer validate (all 10 manifests)
        run: |
          for f in composer.json packages/*/composer.json; do
            composer validate --no-check-publish --no-check-lock --no-check-version "$f"
          done

      - name: Composer install
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHP playground smoke (36 assertions)
        run: php apps/playground/run.php

      - name: RFC-015 + RFC-018 validation suites
        run: |
          php apps/playground/relations-test.php
          php packages/kernel/tests/phase2-actor-attributes.php
          php packages/kernel/tests/phase3-guard-closure.php
          php packages/runtime-default/tests/phase4-guard-runtime.php

      - name: Starter boot
        run: composer --working-dir=packages/starter boot

      - name: npm install (workspace)
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: npm build
        run: npm run build

      - name: npm trace (12 React assertions)
        run: npm run trace

      - name: npm pack --dry-run
        working-directory: renderer/react
        run: npm pack --dry-run

      - name: Clean-room install (only on PHP 8.4 + Node 22)
        if: matrix.php-version == '8.4' && matrix.node-version == '22'
        run: bash scripts/clean-room.sh

      - name: L4 HTTP integration (only on PHP 8.4 + Node 22)
        if: matrix.php-version == '8.4' && matrix.node-version == '22'
        run: bash scripts/integration-http.sh

  # ─────────────────────────────────────────────────────────────────────
  # React-version compatibility job — Legacy line only. Proves
  # @ausus/renderer-react works under each peerDependencies version
  # (^18 || ^19). Unchanged; gated to the Legacy line.
  # ─────────────────────────────────────────────────────────────────────
  react-compat:
    name: react${{ matrix.react-major }}-compat
    runs-on: ubuntu-latest
    needs: [resolve-line, ci-legacy]
    if: needs.resolve-line.outputs.line == 'legacy'

    strategy:
      fail-fast: false
      matrix:
        react-major: ['18', '19']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: npm install (workspace)
        run: npm install --no-audit --no-fund

      - name: Override React version to ${{ matrix.react-major }}
        run: |
          npm install \
            "react@^${{ matrix.react-major }}" \
            "react-dom@^${{ matrix.react-major }}" \
            --no-audit --no-fund
          node -e "console.log('react@'+require('react/package.json').version+' / react-dom@'+require('react-dom/package.json').version)"

      - name: npm build (renderer)
        run: npm run build

      - name: npm trace (12 React assertions on React ${{ matrix.react-major }})
        run: npm run trace
